name: 基金趋势分析报告

on:
  schedule:
    # 每日09:00运行（北京时间 = UTC+8，所以 UTC 1:00）
    - cron: '0 1 * * *'
  workflow_dispatch:
    # 允许手动触发
    inputs:
      wencai_query:
        description: '问财选股查询语句，例如：场外基金近1年涨幅top200'
        required: false
        default: '场外基金近1年涨幅top200'

jobs:
  analyze-funds:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行场外基金分析
        id: analyze-fund
        env:
          WENCAI_QUERY: ${{ secrets.WENCAI_QUERY || github.event.inputs.wencai_query || '场外基金近1年涨幅top200' }}
        run: |
          python "基金趋势大模型_WMA.py"

      - name: 运行宽基指数分析
        id: analyze-index
        run: |
          python "宽基指数趋势大模型_EMA.py"

      - name: 创建整合报告
        id: merge-reports
        run: python merge_reports.py

      - name: 创建输出目录并移动文件
        run: |
          mkdir -p output
          mkdir -p logs
          mv "基金趋势分析.xlsx" output/ 2>/dev/null || true
          mv "宽基指数趋势分析.xlsx" output/ 2>/dev/null || true
          mv "基金与指数趋势分析.xlsx" output/ 2>/dev/null || true
          mv "基金趋势图_"*/ output/ 2>/dev/null || true
          mv "宽基指数邮件正文.html" output/ 2>/dev/null || true

      - name: 上传报告文件
        uses: actions/upload-artifact@v4
        with:
          name: fund-reports
          path: |
            output/*.xlsx
            output/*.png
            output/*.html
            logs/*.log

      - name: 发送邮件通知
        if: always()
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          JOB_STATUS: ${{ job.status }}
        run: python send_email.py
